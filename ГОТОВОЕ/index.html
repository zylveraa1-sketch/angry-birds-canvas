<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Angry Birds</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#1a0a00;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Fredoka One',cursive;touch-action:none;}
#wrapper{position:relative;}
canvas{display:block;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.8);cursor:crosshair;}

/* HUD */
#hud{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:0 14px;pointer-events:none;z-index:5;}
.hud-pill{background:rgba(0,0,0,.65);border:2px solid rgba(255,200,0,.5);border-radius:20px;padding:5px 16px;color:#FFD700;font-size:17px;text-shadow:1px 1px 3px #000;}
#bird-queue{display:flex;gap:6px;align-items:center;}
.bq{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.5);}
.bq-red{background:radial-gradient(circle at 35% 35%,#ff7777,#cc0000);}
.bq-yellow{background:radial-gradient(circle at 35% 35%,#ffee55,#cc8800);}
.bq-black{background:radial-gradient(circle at 35% 35%,#666,#111);}
#stars-row{display:flex;gap:2px;font-size:20px;}

/* Overlay */
#overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:20;align-items:center;justify-content:center;flex-direction:column;border-radius:12px;}
#overlay.show{display:flex;}
.ov-box{background:linear-gradient(145deg,#FF6B20,#FF9A3C);border:4px solid #FFD700;border-radius:28px;padding:34px 52px;text-align:center;animation:pop .4s cubic-bezier(.34,1.56,.64,1);max-width:360px;}
@keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.ov-title{font-size:46px;color:#fff;text-shadow:3px 3px 0 #a03000;}
.ov-stars{font-size:42px;margin:10px 0;letter-spacing:4px;}
.ov-score{font-size:19px;color:#FFE082;font-family:'Nunito',sans-serif;margin-bottom:4px;}
.ov-best{font-size:14px;color:#ffe;font-family:'Nunito',sans-serif;margin-bottom:20px;opacity:.8;}
.ov-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{background:#FFD700;color:#333;border:none;border-radius:50px;padding:11px 28px;font-size:17px;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 5px 0 #b8960c;transition:transform .1s,box-shadow .1s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #b8960c;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #b8960c;}
.btn.sec{background:#fff;color:#555;box-shadow:0 5px 0 #aaa;}

/* Level select */
#lvlsel{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:15;align-items:center;justify-content:center;flex-direction:column;border-radius:12px;}
#lvlsel.show{display:flex;}
.ls-title{font-size:36px;color:#FFD700;text-shadow:2px 2px 0 #000;margin-bottom:22px;}
.ls-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.ls-btn{width:78px;height:78px;background:linear-gradient(145deg,#5BAE35,#3D8020);border:3px solid #FFD700;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;color:#fff;text-shadow:1px 1px 3px #000;box-shadow:0 5px 0 #2a5a10;transition:transform .1s;}
.ls-btn:hover{transform:translateY(-3px);}
.ls-stars-sm{font-size:12px;letter-spacing:1px;}

/* Hint */
#hint{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-size:13px;padding:5px 16px;border-radius:20px;pointer-events:none;font-family:'Nunito',sans-serif;font-weight:700;opacity:0;transition:opacity .3s;z-index:6;white-space:nowrap;}
#hint.show{opacity:1;}
</style>
</head>
<body>
<div id="wrapper">
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-pill">⭐ <span id="h-score">0</span></div>
  <div id="bird-queue"></div>
  <div class="hud-pill" style="display:flex;flex-direction:column;align-items:center;gap:1px;">
    <span style="font-size:12px;opacity:.7;">Уровень <span id="h-level">1</span></span>
    <div id="stars-row"><span id="s1">☆</span><span id="s2">☆</span><span id="s3">☆</span></div>
  </div>
</div>
<div id="hint"></div>
<div id="lvlsel">
  <div class="ls-title">🐦 Выбери уровень</div>
  <div class="ls-grid" id="ls-grid"></div>
</div>
<div id="overlay">
  <div class="ov-box">
    <div class="ov-title" id="ov-title">Победа!</div>
    <div class="ov-stars" id="ov-stars">⭐⭐⭐</div>
    <div class="ov-score">Очки: <span id="ov-score">0</span></div>
    <div class="ov-best" id="ov-best"></div>
    <div class="ov-btns">
      <button class="btn sec" onclick="G.showLevelSel()">Уровни</button>
      <button class="btn" id="ov-next">Далее ▶</button>
    </div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const WW = 900, HH = 540;
cv.width = WW; cv.height = HH;

// scale wrapper to viewport
function resize(){
  const s = Math.min((window.innerWidth-8)/WW, (window.innerHeight-8)/HH);
  cv.style.width  = WW*s+'px';
  cv.style.height = HH*s+'px';
  document.getElementById('wrapper').style.width  = WW*s+'px';
  document.getElementById('wrapper').style.height = HH*s+'px';
}
resize(); window.addEventListener('resize',resize);

const GROUND = HH - 80;
const GRAVITY = 0.4;
const FRICTION = 0.55;
const BOUNCE   = 0.3;
const SLEEP_THRESH = 0.08;

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const rnd = (a,b)=>a+Math.random()*(b-a);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function toCanvas(e){
  const r=cv.getBoundingClientRect();
  const scX=WW/r.width, scY=HH/r.height;
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*scX, y:(t.clientY-r.top)*scY};
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
const PARTS=[];
function spawnP(x,y,col,n=10,spd=5){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(1,spd);
    PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,decay:rnd(.018,.045),r:rnd(3,9),col});
  }
}
function spawnBoom(x,y){
  spawnP(x,y,'#FF6600',30,12); spawnP(x,y,'#FFD700',22,16);
  spawnP(x,y,'#FF2200',16,9); spawnP(x,y,'#fff',10,6);
  // shockwave
  SHOCKWAVES.push({x,y,r:10,maxR:130,life:1});
}
const SHOCKWAVES=[];
function tickParts(){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.22; p.life-=p.decay;
    if(p.life<=0) PARTS.splice(i,1);
  }
  for(let i=SHOCKWAVES.length-1;i>=0;i--){
    const s=SHOCKWAVES[i];
    s.r+=12; s.life-=.08;
    if(s.life<=0) SHOCKWAVES.splice(i,1);
  }
}
function drawParts(){
  PARTS.forEach(p=>{
    cx.save(); cx.globalAlpha=p.life;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill();
    cx.restore();
  });
  SHOCKWAVES.forEach(s=>{
    cx.save(); cx.globalAlpha=s.life*.5;
    cx.strokeStyle='#FF6600'; cx.lineWidth=4;
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.stroke();
    cx.restore();
  });
}

// ═══════════════════════════════════════════════
// AABB COLLISION HELPER
// ═══════════════════════════════════════════════
// Returns MTV (minimum translation vector) or null
function circleAABB(cx2,cy2,r,rx,ry,rw,rh){
  const nearX=clamp(cx2,rx,rx+rw);
  const nearY=clamp(cy2,ry,ry+rh);
  const dx=cx2-nearX, dy=cy2-nearY;
  const d=Math.hypot(dx,dy);
  if(d>=r) return null;
  if(d===0){ // center inside rect
    const overX=r-Math.abs(cx2-(rx+rw/2));
    const overY=r-Math.abs(cy2-(ry+rh/2));
    return overX<overY ? {nx:Math.sign(cx2-(rx+rw/2)),ny:0,depth:overX}
                       : {nx:0,ny:Math.sign(cy2-(ry+rh/2)),depth:overY};
  }
  const pen=r-d;
  return {nx:dx/d, ny:dy/d, depth:pen};
}

// AABB vs AABB
function aabbOverlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// ═══════════════════════════════════════════════
// PHYSICS BODY — used by Block and Pig
// ═══════════════════════════════════════════════
class Body {
  constructor(x,y,w,h,mass=1){
    this.x=x; this.y=y; this.w=w; this.h=h;
    this.vx=0; this.vy=0; this.mass=mass;
    this.sleeping=false; this.sleepTimer=0;
    this.dead=false; this.shakeT=0;
  }
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}

  applyImpulse(ix,iy){
    this.vx+=ix/this.mass; this.vy+=iy/this.mass;
    this.sleeping=false; this.sleepTimer=0;
  }

  integrate(){
    if(this.dead||this.sleeping) return;
    this.vy+=GRAVITY;
    this.x+=this.vx; this.y+=this.vy;

    // Ground collision
    if(this.y+this.h>=GROUND){
      const impact=Math.abs(this.vy);
      this.y=GROUND-this.h;
      this.vy*=-BOUNCE;
      this.vx*=FRICTION;
      if(impact>3) this.onImpact(impact);
    }
    if(this.x<0){this.x=0;this.vx=Math.abs(this.vx)*.5;}
    if(this.x+this.w>WW){this.x=WW-this.w;this.vx=-Math.abs(this.vx)*.5;}

    // Sleep
    const spd=Math.hypot(this.vx,this.vy);
    if(spd<SLEEP_THRESH && this.y+this.h>=GROUND-1){
      this.sleepTimer++; if(this.sleepTimer>20){this.sleeping=true;this.vx=0;this.vy=0;}
    } else { this.sleepTimer=0; }

    if(this.shakeT>0) this.shakeT--;
  }

  onImpact(force){ /* override */ }
}

// ═══════════════════════════════════════════════
// BLOCK
// ═══════════════════════════════════════════════
const BLOCK_HP = {wood:3, stone:6, ice:2};
class Block extends Body {
  constructor(x,y,w,h,type='wood'){
    super(x,y,w,h, type==='stone'?4:type==='wood'?2:1);
    this.type=type;
    this.hp=BLOCK_HP[type]; this.maxHp=this.hp;
  }

  onImpact(force){
    const dmg=Math.floor(force*.35);
    if(dmg>0) this.damage(dmg);
  }

  damage(d){
    this.hp-=d; this.shakeT=10;
    spawnP(this.cx,this.cy,this.type==='stone'?'#aaa':this.type==='wood'?'#c8902a':'#aaddf0',6);
    if(this.hp<=0){
      this.dead=true;
      spawnP(this.cx,this.cy,this.type==='stone'?'#999':this.type==='wood'?'#b07820':'#88ccee',16);
      return true;
    }
    return false;
  }

  draw(){
    if(this.dead) return;
    const ox=this.shakeT>0?rnd(-2,2):0;
    cx.save(); cx.translate(ox,0);
    const fills={wood:'#D4A55A',stone:'#BBBBBB',ice:'#AADDFF'};
    const strokes={wood:'#A06820',stone:'#777',ice:'#5599CC'};
    cx.fillStyle=fills[this.type]||fills.wood;
    cx.strokeStyle=strokes[this.type]||strokes.wood;
    cx.lineWidth=2;
    cx.beginPath(); cx.roundRect(this.x,this.y,this.w,this.h,3); cx.fill(); cx.stroke();
    if(this.type==='wood'){
      cx.strokeStyle='#A06820AA'; cx.lineWidth=1;
      for(let i=1;i<Math.floor(this.h/18);i++){
        const ly=this.y+this.h*(i/(Math.floor(this.h/18)));
        cx.beginPath(); cx.moveTo(this.x+3,ly); cx.lineTo(this.x+this.w-3,ly); cx.stroke();
      }
    }
    if(this.type==='stone'){
      cx.fillStyle='rgba(0,0,0,.07)';
      for(let i=0;i<3;i++) cx.fillRect(this.x+rnd(3,this.w-8),this.y+rnd(3,this.h-8),rnd(4,12),rnd(2,5));
    }
    // Cracks
    const ratio=this.hp/this.maxHp;
    if(ratio<.7){
      cx.strokeStyle='rgba(0,0,0,.45)'; cx.lineWidth=1.5;
      cx.beginPath();
      cx.moveTo(this.x+this.w*.25,this.y+4);
      cx.lineTo(this.x+this.w*.5,this.y+this.h*.45);
      cx.lineTo(this.x+this.w*.72,this.y+this.h-4);
      cx.stroke();
    }
    if(ratio<.4){
      cx.strokeStyle='rgba(0,0,0,.4)'; cx.lineWidth=1.5;
      cx.beginPath();
      cx.moveTo(this.x+this.w*.6,this.y+4);
      cx.lineTo(this.x+this.w*.35,this.y+this.h*.55);
      cx.lineTo(this.x+this.w*.55,this.y+this.h-4);
      cx.stroke();
    }
    cx.restore();
  }
}

// ═══════════════════════════════════════════════
// PIG
// ═══════════════════════════════════════════════
class Pig extends Body {
  constructor(x,y,r=22,hp=1,helmet=false){
    // treat pig as square body for physics, draw as circle
    super(x-r,y-r,r*2,r*2, 1.5);
    this.r=r; this.hp=hp; this.maxHp=hp;
    this.helmet=helmet; this.score=200;
  }

  onImpact(force){
    const dmg=Math.floor(force*.4);
    if(dmg>0) this.takeDmg(dmg);
  }

  takeDmg(d){
    this.hp-=d; this.shakeT=14;
    spawnP(this.cx,this.cy,'#7EC850',8);
    if(this.hp<=0){
      this.dead=true;
      spawnP(this.cx,this.cy,'#5A9E35',20);
      return true;
    }
    return false;
  }

  draw(){
    if(this.dead) return;
    const ox=this.shakeT>0?rnd(-3,3):0;
    const px=this.cx+ox, py=this.cy;
    const r=this.r;

    cx.save(); cx.translate(px,py);
    // Shadow
    cx.save(); cx.globalAlpha=.2; cx.fillStyle='#000';
    cx.beginPath(); cx.ellipse(0,r+2,r*.9,r*.35,0,0,Math.PI*2); cx.fill(); cx.restore();

    const g=cx.createRadialGradient(-r*.25,-r*.28,r*.05,0,0,r);
    g.addColorStop(0,'#b4ef6a'); g.addColorStop(.6,'#7EC850'); g.addColorStop(1,'#4a9020');
    cx.fillStyle=g;
    cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#3a7018'; cx.lineWidth=1.5;
    cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.stroke();

    if(this.hp<this.maxHp){
      cx.strokeStyle='rgba(0,50,0,.4)'; cx.lineWidth=1.5;
      cx.beginPath(); cx.moveTo(-r*.3,r*.1); cx.lineTo(0,-r*.25); cx.lineTo(r*.3,r*.3); cx.stroke();
    }
    // Snout
    cx.fillStyle='#88cc45';
    cx.beginPath(); cx.ellipse(0,r*.32,r*.42,r*.28,0,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#3a7018'; cx.lineWidth=1;
    cx.beginPath(); cx.ellipse(0,r*.32,r*.42,r*.28,0,0,Math.PI*2); cx.stroke();
    cx.fillStyle='#2a5a10';
    cx.beginPath(); cx.arc(-r*.13,r*.33,r*.1,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(r*.13,r*.33,r*.1,0,Math.PI*2); cx.fill();
    // Eyes
    cx.fillStyle='#fff';
    cx.beginPath(); cx.arc(-r*.28,-r*.12,r*.28,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(r*.28,-r*.12,r*.28,0,Math.PI*2); cx.fill();
    cx.fillStyle='#111';
    cx.beginPath(); cx.arc(-r*.22,-r*.09,r*.13,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(r*.33,-r*.09,r*.13,0,Math.PI*2); cx.fill();
    cx.fillStyle='#fff';
    cx.beginPath(); cx.arc(-r*.16,-r*.16,r*.05,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(r*.39,-r*.16,r*.05,0,Math.PI*2); cx.fill();
    // Ears
    cx.fillStyle='#5BA030';
    cx.beginPath(); cx.arc(-r*.7,-r*.5,r*.2,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(r*.7,-r*.5,r*.2,0,Math.PI*2); cx.fill();
    // Helmet
    if(this.helmet){
      cx.strokeStyle='#9a8020'; cx.lineWidth=r*.24;
      cx.beginPath(); cx.arc(0,-r*.08,r+r*.08,-Math.PI*1.1,-Math.PI*.05); cx.stroke();
      cx.fillStyle='#c0a030';
      cx.beginPath(); cx.ellipse(0,-r-3,r*.5,r*.18,0,0,Math.PI*2); cx.fill();
    }
    // HP bar
    if(this.maxHp>1){
      const bw=r*2.2,bh=6,bx=-r*1.1,by=-r-18;
      cx.fillStyle='#333'; cx.beginPath(); cx.roundRect(bx,by,bw,bh,3); cx.fill();
      const ratio=this.hp/this.maxHp;
      cx.fillStyle=ratio>.6?'#44FF44':ratio>.3?'#FFAA00':'#FF3333';
      cx.beginPath(); cx.roundRect(bx,by,bw*ratio,bh,3); cx.fill();
    }
    cx.restore();
    this.shakeT=Math.max(0,this.shakeT-1);
  }
}

// ═══════════════════════════════════════════════
// BIRD
// ═══════════════════════════════════════════════
class Bird {
  constructor(type,x,y){
    this.type=type;
    this.r=type==='black'?27:22;
    this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.launched=false; this.dead=false;
    this.trail=[];
    this.abilityUsed=false;
    this.boosted=false;
    this.fuseTimer=0;   // black: countdown to explode
    this.fuseActive=false;
    this.exploding=false;
    this.explodeFrame=0;
    this.groundHits=0;
  }

  launch(vx,vy){this.vx=vx;this.vy=vy;this.launched=true;}

  useAbility(){
    if(this.abilityUsed||!this.launched||this.dead) return false;
    if(this.type==='yellow'){
      const spd=Math.hypot(this.vx,this.vy);
      const nx=this.vx/spd, ny=this.vy/spd;
      this.vx=nx*(spd*2.4+3); this.vy=ny*(spd*2.4+3);
      this.boosted=true; this.abilityUsed=true;
      spawnP(this.x,this.y,'#FFD700',12,7);
      showHint('⚡ Ускорение!'); return true;
    }
    if(this.type==='black'){
      this.fuseActive=true; this.fuseTimer=35; this.abilityUsed=true;
      showHint('💣 Взрыв!'); return true;
    }
    return false;
  }

  doExplode(){
    spawnBoom(this.x,this.y);
    this.exploding=true; this.explodeFrame=10;
    G.explosionDamage(this.x,this.y,115);
  }

  update(){
    if(!this.launched||this.dead) return;
    if(this.exploding){
      this.explodeFrame--;
      if(this.explodeFrame<=0) this.dead=true;
      return;
    }
    if(this.fuseActive){
      this.fuseTimer--;
      if(this.fuseTimer<=0){ this.doExplode(); return; }
    }
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>30) this.trail.shift();
    this.vy+=GRAVITY;
    this.x+=this.vx; this.y+=this.vy;

    if(this.y>=GROUND-this.r){
      this.y=GROUND-this.r;
      const imp=Math.abs(this.vy);
      this.vy*=-BOUNCE*.6;
      this.vx*=0.65;
      this.groundHits++;
      if(imp<2||this.groundHits>2){ this.dead=true; spawnP(this.x,this.y,'#aaa',6,3); return; }
      spawnP(this.x,this.y,'#aaa',4,2);
    }
    if(this.x>WW+80||this.x<-80) this.dead=true;
  }

  angle(){ return this.launched?Math.atan2(this.vy,this.vx):0; }

  draw(){
    if(this.dead&&!this.exploding) return;
    if(this.exploding){
      cx.save();
      const ef=this.explodeFrame/10;
      cx.globalAlpha=ef*.9;
      const eg=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,115);
      eg.addColorStop(0,'#fff'); eg.addColorStop(.25,'#FFE000');
      eg.addColorStop(.6,'#FF4400'); eg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=eg; cx.beginPath(); cx.arc(this.x,this.y,115,0,Math.PI*2); cx.fill();
      cx.restore(); return;
    }
    // Trail
    this.trail.forEach((p,i)=>{
      cx.save(); cx.globalAlpha=(i/this.trail.length)*.25;
      cx.fillStyle=this.type==='yellow'?'#FFD700':this.type==='black'?'#FF6600':'#FF4444';
      cx.beginPath(); cx.arc(p.x,p.y,this.r*(i/this.trail.length)*.5,0,Math.PI*2); cx.fill();
      cx.restore();
    });
    const a=this.angle();
    if(this.type==='red') drawRed(this.x,this.y,this.r,a);
    else if(this.type==='yellow') drawYellow(this.x,this.y,this.r,a,this.boosted);
    else drawBlack(this.x,this.y,this.r,a,this.fuseActive?this.fuseTimer/35:0);
  }
}

// BIRD DRAW FUNCS
// ═══════════════════════════════════════════════
function drawRed(x,y,r,a){
  cx.save(); cx.translate(x,y); cx.rotate(a);
  // Shadow
  cx.save(); cx.globalAlpha=.2; cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(0,r+2,r*.85,r*.28,0,0,Math.PI*2); cx.fill(); cx.restore();
  const g=cx.createRadialGradient(-r*.22,-r*.25,r*.08,0,0,r);
  g.addColorStop(0,'#FF7777'); g.addColorStop(1,'#BB0000');
  cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#880000'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.stroke();
  // Crest
  cx.fillStyle='#990000';
  cx.beginPath(); cx.moveTo(-4,-r-1); cx.lineTo(2,-r-11); cx.lineTo(8,-r-1); cx.lineTo(13,-r+3); cx.lineTo(8,-r+6); cx.closePath(); cx.fill();
  // Eye
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(r*.28,-r*.18,r*.34,0,Math.PI*2); cx.fill();
  cx.fillStyle='#111'; cx.beginPath(); cx.arc(r*.34,-r*.15,r*.17,0,Math.PI*2); cx.fill();
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(r*.41,-r*.22,r*.07,0,Math.PI*2); cx.fill();
  // Brow
  cx.strokeStyle='#550000'; cx.lineWidth=r*.13; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(r*.04,-r*.46); cx.lineTo(r*.55,-r*.31); cx.stroke();
  // Beak
  cx.fillStyle='#FFA500';
  cx.beginPath(); cx.moveTo(r*.55,r*.06); cx.lineTo(r*.92,-r*.08); cx.lineTo(r*.55,r*.28); cx.closePath(); cx.fill();
  cx.restore();
}

function drawYellow(x,y,r,a,boosted){
  cx.save(); cx.translate(x,y); cx.rotate(a);
  if(boosted){
    cx.strokeStyle='rgba(255,220,0,.55)'; cx.lineWidth=2;
    for(let i=0;i<6;i++){
      const ly=rnd(-r,r);
      cx.beginPath(); cx.moveTo(-r*2.2,ly); cx.lineTo(-r*1.1,ly); cx.stroke();
    }
  }
  const g=cx.createRadialGradient(-r*.2,-r*.22,r*.06,0,0,r);
  g.addColorStop(0,'#FFEE55'); g.addColorStop(1,'#CC8800');
  cx.fillStyle=g;
  cx.beginPath(); cx.moveTo(r*.92,0); cx.lineTo(0,-r*.78); cx.lineTo(-r*.92,0); cx.lineTo(0,r*.78); cx.closePath(); cx.fill();
  cx.strokeStyle='#996600'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(r*.92,0); cx.lineTo(0,-r*.78); cx.lineTo(-r*.92,0); cx.lineTo(0,r*.78); cx.closePath(); cx.stroke();
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(r*.26,-r*.1,r*.3,0,Math.PI*2); cx.fill();
  cx.fillStyle='#111'; cx.beginPath(); cx.arc(r*.31,-r*.08,r*.15,0,Math.PI*2); cx.fill();
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(r*.37,-r*.15,r*.06,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#553300'; cx.lineWidth=r*.12; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(r*.06,-r*.38); cx.lineTo(r*.52,-r*.24); cx.stroke();
  cx.fillStyle='#FF8800';
  cx.beginPath(); cx.moveTo(r*.6,0); cx.lineTo(r*.98,.1); cx.lineTo(r*.6,r*.22); cx.closePath(); cx.fill();
  cx.restore();
}

function drawBlack(x,y,r,a,fuse){
  cx.save(); cx.translate(x,y); cx.rotate(a);
  if(fuse<.5&&fuse>0){
    cx.save(); cx.globalAlpha=(1-fuse)*0.6;
    const fg=cx.createRadialGradient(0,0,r*.5,0,0,r*1.8);
    fg.addColorStop(0,'#FF4400'); fg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=fg; cx.beginPath(); cx.arc(0,0,r*1.8,0,Math.PI*2); cx.fill();
    cx.restore();
  }
  const g=cx.createRadialGradient(-r*.22,-r*.3,r*.08,0,0,r);
  g.addColorStop(0,'#666'); g.addColorStop(1,'#111');
  cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#333'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.stroke();
  // Fuse
  cx.strokeStyle='#aa8833'; cx.lineWidth=r*.13; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(r*.1,-r); cx.bezierCurveTo(r*.3,-r*1.45,r*.5,-r*1.3,r*.4,-r*1.65); cx.stroke();
  // Spark at tip
  if(fuse>0) spawnP(x+r*.4*Math.cos(a)-r*1.65*Math.sin(a), y+r*.4*Math.sin(a)-r*1.65*Math.cos(a),'#FFD700',1,2);
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(r*.28,-r*.16,r*.3,0,Math.PI*2); cx.fill();
  cx.fillStyle='#111'; cx.beginPath(); cx.arc(r*.33,-r*.13,r*.16,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#111'; cx.lineWidth=r*.14; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(r*.03,-r*.44); cx.lineTo(r*.53,-r*.3); cx.stroke();
  cx.fillStyle='#cc7700';
  cx.beginPath(); cx.moveTo(r*.55,r*.08); cx.lineTo(r*.93,-r*.07); cx.lineTo(r*.55,r*.28); cx.closePath(); cx.fill();
  cx.restore();
}

// ═══════════════════════════════════════════════
// SLINGSHOT
// ═══════════════════════════════════════════════
const SL={x:145, y:GROUND-92};
function drawSling(bird,drag,dx,dy){
  cx.save();
  // Post
  cx.strokeStyle='#7B4F28'; cx.lineWidth=12; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(SL.x,GROUND); cx.lineTo(SL.x,SL.y); cx.stroke();
  // Fork
  cx.lineWidth=10;
  cx.beginPath(); cx.moveTo(SL.x,SL.y+5); cx.lineTo(SL.x-22,SL.y-28); cx.stroke();
  cx.beginPath(); cx.moveTo(SL.x,SL.y+5); cx.lineTo(SL.x+22,SL.y-28); cx.stroke();
  // Knobs
  cx.fillStyle='#5a3a18';
  cx.beginPath(); cx.arc(SL.x-22,SL.y-28,8,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(SL.x+22,SL.y-28,8,0,Math.PI*2); cx.fill();
  // Rubber bands
  const bx=drag?dx:(bird?bird.x:SL.x);
  const by=drag?dy:(bird?bird.y:SL.y-14);
  cx.strokeStyle='#8B5A14'; cx.lineWidth=5;
  // Back band (behind bird)
  cx.beginPath(); cx.moveTo(SL.x+22,SL.y-28); cx.lineTo(bx,by); cx.stroke();
  // Front band
  cx.beginPath(); cx.moveTo(SL.x-22,SL.y-28); cx.lineTo(bx,by); cx.stroke();
  cx.restore();
}

  blocks.push(new Block(OX,     GROUND-22,  380,22,'stone'));

// ═══════════════════════════════════════════════
// MAIN GAME
// ═══════════════════════════════════════════════
const G={
  level:1, score:0,
  birds:[], pigs:[], blocks:[],
  activeBird:null, birdTypes:[], birdIdx:0,
  dragging:false, dragX:0, dragY:0,
  state:'playing',
  _advancing:false,

  init(lvl){
    if(lvl!==undefined) this.level=lvl;
    const def=makeLevel(this.level);
    this.pigs=def.pigs; this.blocks=def.blocks;
    this.birdTypes=def.birds; this.birdIdx=0;
    this.birds=[]; this.score=0;
    this.dragging=false; this.state='playing';
    this._advancing=false;
    PARTS.length=0; SHOCKWAVES.length=0;
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('lvlsel').classList.remove('show');
    this.spawnNext();
    this.updateHUD();
  },

  spawnNext(){
    if(this.birdIdx>=this.birdTypes.length){this.activeBird=null;return;}
    const t=this.birdTypes[this.birdIdx++];
    const b=new Bird(t,SL.x,SL.y-14);
    this.birds.push(b); this.activeBird=b;
    const hints={red:'🔴 Красная — просто летит',yellow:'🟡 Жёлтая — двойной клик = ускорение',black:'⚫ Чёрная — двойной клик = взрыв'};
    showHint(hints[t]||'');
  },

  updateHUD(){
    document.getElementById('h-score').textContent=this.score;
    document.getElementById('h-level').textContent=this.level;
    const bq=document.getElementById('bird-queue'); bq.innerHTML='';
    this.birdTypes.slice(this.birdIdx).forEach(t=>{
      const d=document.createElement('div');
      d.className=`bq bq-${t}`; bq.appendChild(d);
    });
    const killed=this.pigs.filter(p=>p.dead).length;
    for(let i=1;i<=3;i++){
      document.getElementById('s'+i).textContent=killed>=i?'⭐':'☆';
    }
  },

  getStars(){return Math.min(3,this.pigs.filter(p=>p.dead).length);},

  explosionDamage(ex,ey,rad){
    for(const p of this.pigs){
      if(p.dead) continue;
      const d=Math.max(0,dist({x:ex,y:ey},{x:p.cx,y:p.cy})-p.r);
      if(d<rad){
        const dmg=Math.ceil((1-d/rad)*5);
        const dir={x:p.cx-ex,y:p.cy-ey};
        const dl=Math.hypot(dir.x,dir.y)||1;
        const force=(1-d/rad)*22;
        p.vx+=dir.x/dl*force; p.vy+=dir.y/dl*force-8;
        p.sleeping=false;
        const k=p.takeDmg(dmg);
        if(k) this.score+=300;
      }
    }
    for(const bl of this.blocks){
      if(bl.dead) continue;
      const d=Math.max(0,dist({x:ex,y:ey},{x:bl.cx,y:bl.cy})-20);
      if(d<rad){
        const force=(1-d/rad)*18;
        const dir={x:bl.cx-ex,y:bl.cy-ey};
        const dl=Math.hypot(dir.x,dir.y)||1;
        bl.vx+=dir.x/dl*force; bl.vy+=dir.y/dl*force-6;
        bl.sleeping=false;
        const dmg=Math.ceil((1-d/rad)*4);
        const k=bl.damage(dmg);
        if(k) this.score+=60;
      }
    }
    this.updateHUD();
  },

  // ─── PHYSICS STEP ──────────────────────────────
  physicsStep(){
    // Integrate all bodies
    for(const bl of this.blocks) bl.integrate();
    for(const p  of this.pigs)   p.integrate();

    // Block vs Block collisions
    for(let i=0;i<this.blocks.length;i++){
      const a=this.blocks[i]; if(a.dead) continue;
      for(let j=i+1;j<this.blocks.length;j++){
        const b=this.blocks[j]; if(b.dead) continue;
        if(!aabbOverlap(a.x,a.y,a.w,a.h,b.x,b.y,b.w,b.h)) continue;
        // Simple push apart
        const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x);
        const oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
        if(ox<oy){
          const d=ox*.5;
          const sign=a.cx<b.cx?-1:1;
          if(!a.sleeping){a.x+=sign*d; const imp=Math.abs(a.vx); a.vx*=-.4; if(imp>3)a.damage(Math.floor(imp*.3));}
          if(!b.sleeping){b.x-=sign*d; const imp=Math.abs(b.vx); b.vx*=-.4; if(imp>3)b.damage(Math.floor(imp*.3));}
        } else {
          const sign=a.cy<b.cy?-1:1;
          if(!a.sleeping&&sign<0){a.y+=sign*oy*.5; const imp=Math.abs(a.vy); a.vy*=-.35; if(imp>3)a.damage(Math.floor(imp*.3));}
          if(!b.sleeping&&sign>0){b.y-=sign*oy*.5; const imp=Math.abs(b.vy); b.vy*=-.35; if(imp>3)b.damage(Math.floor(imp*.3));}
        }
      }
    }

    // Pig vs Block collisions (pig lands on block / gets crushed)
    for(const p of this.pigs){
      if(p.dead) continue;
      for(const bl of this.blocks){
        if(bl.dead) continue;
        const mtv=circleAABB(p.cx,p.cy,p.r+2,bl.x,bl.y,bl.w,bl.h);
        if(!mtv) continue;
        // Push pig out
        p.x+=mtv.nx*mtv.depth;
        p.y+=mtv.ny*mtv.depth;
        const imp=Math.abs(p.vx*mtv.nx+p.vy*mtv.ny);
        // Reflect velocity component
        const dot=p.vx*mtv.nx+p.vy*mtv.ny;
        p.vx-=(1+BOUNCE)*dot*mtv.nx;
        p.vy-=(1+BOUNCE)*dot*mtv.ny;
        p.vx*=FRICTION;
        if(imp>3){ const k=p.takeDmg(Math.floor(imp*.45)); if(k) this.score+=200; this.updateHUD(); }
        p.sleeping=false;
      }
    }
  },

  // ─── BIRD COLLISION ────────────────────────────
  birdCollision(){
    const ab=this.activeBird;
    if(!ab||!ab.launched||ab.dead||ab.exploding) return;
    const spd=Math.hypot(ab.vx,ab.vy);
    const dmg=Math.max(1,Math.floor(spd*.35));

    // vs pigs
    for(const p of this.pigs){
      if(p.dead) continue;
      if(dist(ab,{x:p.cx,y:p.cy})<ab.r+p.r){
        const k=p.takeDmg(dmg);
        if(k) this.score+=200;
        // knock pig
        const dx=p.cx-ab.x, dy=p.cy-ab.y;
        const dl=Math.hypot(dx,dy)||1;
        p.vx+=dx/dl*spd*.5; p.vy+=dy/dl*spd*.5-4;
        p.sleeping=false;
        ab.dead=true; spawnP(ab.x,ab.y,'#FF8844',14); this.updateHUD(); return;
      }
    }

    // vs blocks
    for(const bl of this.blocks){
      if(bl.dead) continue;
      const mtv=circleAABB(ab.x,ab.y,ab.r,bl.x,bl.y,bl.w,bl.h);
      if(!mtv) continue;
      // push bird out
      ab.x+=mtv.nx*mtv.depth; ab.y+=mtv.ny*mtv.depth;
      const imp=ab.vx*mtv.nx+ab.vy*mtv.ny;
      // apply impulse to block
      bl.vx-=mtv.nx*spd*.6; bl.vy-=mtv.ny*spd*.6-3;
      bl.sleeping=false;
      const k=bl.damage(dmg);
      if(k) this.score+=50;
      // bird bounces weakly
      ab.vx-=(1.6)*imp*mtv.nx; ab.vy-=(1.6)*imp*mtv.ny;
      ab.vx*=.6; ab.vy*=.6;
      ab.groundHits++;
      if(ab.groundHits>1){ ab.dead=true; spawnP(ab.x,ab.y,'#CC8844',10); }
      this.updateHUD(); return;
    }
  },

  checkEnd(){
    if(this.state!=='playing') return;
    if(this.pigs.filter(p=>!p.dead).length===0){
      const rem=(this.birdTypes.length-this.birdIdx)+(!this.activeBird||this.activeBird.launched?0:1);
      this.score+=rem*500;
      this.state='win'; this.updateHUD();
      setTimeout(()=>this.showResult(true),1000); return;
    }
    if(!this.activeBird&&!this._advancing){
      this.state='lose';
      setTimeout(()=>this.showResult(false),1000);
    }
  },

  showResult(win){
    const stars=win?this.getStars():0;
    const key='ab_l'+this.level;
    const prev=parseInt(localStorage.getItem(key)||'0');
    if(stars>prev) localStorage.setItem(key,stars);
    const best=Math.max(stars,prev);
    document.getElementById('ov-title').textContent=win?'Победа! 🎉':'Проигрыш 😢';
    document.getElementById('ov-stars').textContent=win?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆';
    document.getElementById('ov-score').textContent=this.score;
    document.getElementById('ov-best').textContent='Рекорд: '+'⭐'.repeat(best)+'☆'.repeat(3-best);
    const nb=document.getElementById('ov-next');
    if(win&&this.level<5){nb.textContent='Далее ▶';nb.onclick=()=>{G.init(G.level+1);};}
    else {nb.textContent='Заново 🔄';nb.onclick=()=>G.init();}
    document.getElementById('overlay').classList.add('show');
  },

  showLevelSel(){
    document.getElementById('overlay').classList.remove('show');
    const grid=document.getElementById('ls-grid'); grid.innerHTML='';
    for(let i=1;i<=5;i++){
      const st=parseInt(localStorage.getItem('ab_l'+i)||'0');
      const btn=document.createElement('div'); btn.className='ls-btn';
      btn.innerHTML=`<span>${i}</span><span class="ls-stars-sm">${'⭐'.repeat(st)+'☆'.repeat(3-st)}</span>`;
      btn.onclick=()=>G.init(i);
      grid.appendChild(btn);
    }
    document.getElementById('lvlsel').classList.add('show');
  },

  // ─── INPUT ─────────────────────────────────────
  onDown(e){
    if(this.state!=='playing') return;
    const {x,y}=toCanvas(e);
    if(this.activeBird&&this.activeBird.launched){this.activeBird.useAbility();return;}
    if(!this.activeBird||this.activeBird.launched) return;
    if(dist({x,y},{x:this.activeBird.x,y:this.activeBird.y})<50){
      this.dragging=true; this.dragX=x; this.dragY=y;
    }
  },
  onMove(e){
    if(!this.dragging) return;
    const {x,y}=toCanvas(e);
    const MAX=92;
    const dx=x-SL.x, dy=y-SL.y;
    const d=Math.hypot(dx,dy);
    if(d>MAX){this.dragX=SL.x+dx/d*MAX;this.dragY=SL.y+dy/d*MAX;}
    else{this.dragX=x;this.dragY=y;}
    if(this.activeBird){this.activeBird.x=this.dragX;this.activeBird.y=this.dragY;}
  },
  onUp(e){
    if(!this.dragging||!this.activeBird) return;
    this.dragging=false;
    const dx=SL.x-this.dragX, dy=SL.y-this.dragY;
    const pw=0.22;
    this.activeBird.launch(dx*pw, dy*pw-.5);
  },

  // ─── UPDATE ────────────────────────────────────
  update(){
    if(this.state!=='playing') return;
    for(const b of this.birds) b.update();
    this.physicsStep();
    this.birdCollision();
    tickParts();
    if(hintTimer>0){hintTimer--;if(hintTimer===0)document.getElementById('hint').classList.remove('show');}
    // Advance bird after it dies
    if(this.activeBird&&this.activeBird.dead&&!this._advancing){
      this._advancing=true;
      setTimeout(()=>{
        this._advancing=false;
        this.spawnNext();
        this.updateHUD();
      },750);
      this.activeBird=null;
    }
    this.checkEnd();
  },

  // ─── DRAW ───────────────────────────────────────
  draw(){
    // Sky gradient
    const sky=cx.createLinearGradient(0,0,0,HH);
    sky.addColorStop(0,'#3A7DC9'); sky.addColorStop(.6,'#87CEEB');
    cx.fillStyle=sky; cx.fillRect(0,0,WW,HH);

    // Distant hills
    cx.fillStyle='#5aa038';
    cx.beginPath(); cx.moveTo(0,GROUND+15);
    const hills=[[60,GROUND-55],[160,GROUND-30],[280,GROUND-70],[430,GROUND-40],[560,GROUND-80],[680,GROUND-35],[800,GROUND-60],[WW,GROUND-20]];
    hills.forEach(h=>cx.lineTo(h[0],h[1]));
    cx.lineTo(WW,HH); cx.lineTo(0,HH); cx.closePath(); cx.fill();

    drawClouds();

    // Ground
    const gg=cx.createLinearGradient(0,GROUND,0,HH);
    gg.addColorStop(0,'#7EC850'); gg.addColorStop(.2,'#5A9E35'); gg.addColorStop(1,'#3a6e20');
    cx.fillStyle=gg; cx.fillRect(0,GROUND,WW,HH-GROUND);
    // Ground edge stripe
    cx.fillStyle='#6abf40'; cx.fillRect(0,GROUND,WW,6);
    cx.fillStyle='rgba(0,0,0,.08)';
    for(let x=0;x<WW;x+=22) cx.fillRect(x,GROUND,2,6);

    // Blocks (back to front)
    for(const bl of this.blocks) bl.draw();
    // Pigs
    for(const p of this.pigs) p.draw();

    // Slingshot
    drawSling(
      (!this.activeBird||this.activeBird.launched)?null:this.activeBird,
      this.dragging, this.dragX, this.dragY
    );

    // Birds (all)
    for(const b of this.birds) b.draw();

    // Aim arc
    if(this.dragging&&this.activeBird){
      const dx=SL.x-this.dragX, dy=SL.y-this.dragY;
      const pw=0.22;
      let px=this.dragX,py=this.dragY,vx=dx*pw,vy=dy*pw-.5;
      cx.save(); cx.strokeStyle='rgba(255,255,255,.4)'; cx.setLineDash([5,9]); cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(px,py);
      for(let i=0;i<42;i++){vy+=GRAVITY;px+=vx;py+=vy;if(py>GROUND)break;cx.lineTo(px,py);}
      cx.stroke(); cx.restore();
    }

    // Waiting bird queue on ground (behind sling)
    const waiting=this.birdTypes.slice(this.birdIdx);
    waiting.forEach((t,i)=>{
      const wx=SL.x-36-i*38, wy=GROUND-15;
      cx.save(); cx.scale(.68,.68); cx.translate(wx/.68-(wx/.68)*.32, wy/.68-(wy/.68)*.32);
      if(t==='red') drawRed(wx/.68,wy/.68,14,0);
      else if(t==='yellow') drawYellow(wx/.68,wy/.68,14,0,false);
      else drawBlack(wx/.68,wy/.68,16,0,0);
      cx.restore();
    });

    drawParts();
  }
};

// ═══════════════════════════════════════════════
// INPUT BINDING (double-tap = ability)
// ═══════════════════════════════════════════════
let lastTap=0;
function handleDown(e){
  const now=Date.now();
  if(now-lastTap<320&&G.activeBird&&G.activeBird.launched){
    G.activeBird.useAbility(); lastTap=0; return;
  }
  lastTap=now; G.onDown(e);
}
cv.addEventListener('mousedown',handleDown);
cv.addEventListener('mousemove',e=>G.onMove(e));
cv.addEventListener('mouseup',e=>G.onUp(e));
cv.addEventListener('touchstart',e=>{e.preventDefault();handleDown(e);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();G.onMove(e);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();G.onUp(e);},{passive:false});

// ═══════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════
function loop(){G.update();G.draw();requestAnimationFrame(loop);}
G.init(1);
loop();
</script>
